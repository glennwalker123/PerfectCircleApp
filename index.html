<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0b1020" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Perfect Circle</title>
<link rel="stylesheet" href="styles.css?v=17" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>Perfect Circle</h1>
      <p class="hint" id="hint">Draw a circle in one stroke</p>
    </header>

    <div class="stage">
      <canvas id="canvas"></canvas>
      <div class="overlay" id="overlay">
        <div class="score-card" id="scoreCard" hidden>
          <div class="score-number" id="scoreNumber">0</div>
          <div class="score-label">out of 100</div>
          <div class="score-grade" id="scoreGrade"></div>
          <div class="streak-row" id="streakRow" hidden>
            <span class="streak-flame">🔥</span>
            <span class="streak-count" id="streakCount">0</span>
            <span class="streak-label">streak</span>
          </div>
        </div>
      </div>
    </div>

    <footer class="controls">
      <button id="clearBtn" class="btn">Try again</button>
      <div class="stats">
        <span class="stat">Best <span id="bestScore">—</span></span>
        <span class="stat-sep">·</span>
        <span class="stat">Streak <span id="footerStreak">0</span></span>
      </div>
    </footer>
  </div>

  <script src="app.js?v=17"></script>
</body>
</html>
