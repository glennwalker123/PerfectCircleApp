<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#08080f" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>ROOTS — The Family Tree of Music</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="genre.css?v=3" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>ROOTS</h1>
      <div class="legend" id="legend"></div>
    </header>

    <div class="stage">
      <div class="map-wrap" id="mapWrap">
        <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>

      <div class="hud" id="hud">
        <!-- Start -->
        <div class="hud-view" id="hudStart">
          <p class="panel-text">Hear a track, name the sub-genre, and watch the family tree of music grow — from the Delta blues to UK drill.</p>
          <button class="btn btn-big" id="startBtn">Start</button>
        </div>

        <!-- Chapter intro -->
        <div class="hud-view" id="hudChapter" hidden>
          <span class="kicker" id="chapterKicker">Chapter 1 of 5</span>
          <h2 class="chapter-title" id="chapterTitle">Blue Note</h2>
          <p class="panel-text" id="chapterText"></p>
          <button class="btn btn-big" id="chapterBeginBtn">Begin chapter</button>
        </div>

        <!-- Loading -->
        <div class="hud-view" id="hudLoading" hidden>
          <div class="spinner"></div>
          <span class="panel-text">Cueing the track…</span>
        </div>

        <!-- Error -->
        <div class="hud-view" id="hudError" hidden>
          <span class="panel-text" id="errorText">Couldn’t load a track.</span>
          <button class="btn" id="retryBtn">Try again</button>
        </div>

        <!-- Guessing -->
        <div class="hud-view" id="hudRound" hidden>
          <div class="now-playing">
            <div class="eq" id="eq" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
            <span id="playState">Playing intro…</span>
            <button class="icon-btn" id="replayBtn" title="Replay intro">↺</button>
          </div>
          <div class="options" id="options"></div>
          <button class="btn btn-ghost btn-another" id="anotherBtn" hidden>Hear another track</button>
        </div>

        <!-- Reveal -->
        <div class="hud-view reveal" id="hudReveal" hidden>
          <div class="reveal-head">
            <span class="reveal-dot" id="revealDot"></span>
            <span class="reveal-name" id="revealName"></span>
            <span class="reveal-era" id="revealEra"></span>
          </div>
          <div class="reveal-track" id="revealTrack"></div>
          <p class="reveal-blurb" id="revealBlurb"></p>
          <div class="reveal-links" id="revealLinks"></div>
          <button class="btn btn-big" id="nextBtn">Next</button>
        </div>

        <!-- End -->
        <div class="hud-view" id="hudEnd" hidden>
          <div class="big-emoji">🎶</div>
          <p class="panel-text" id="endText"></p>
          <button class="btn btn-big" id="replayJourneyBtn">Play again</button>
        </div>
      </div>
    </div>

    <footer class="controls">
      <span class="stat">Discovered <span id="discovered">0</span>/<span id="total">0</span></span>
      <div class="stats">
        <span class="stat">Streak <span id="footerStreak">0</span></span>
        <span class="stat-sep">·</span>
        <span class="stat">Best <span id="bestScore">0</span></span>
      </div>
    </footer>
  </div>

  <audio id="player" preload="auto"></audio>
  <script src="genre.js?v=3"></script>
</body>
</html>
