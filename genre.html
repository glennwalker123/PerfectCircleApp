<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0b1020" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Guess the Genre</title>
<link rel="stylesheet" href="genre.css?v=1" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>Guess the Genre</h1>
      <p class="hint" id="hint">Listen to the intro, then pick the genre</p>
    </header>

    <div class="stage">
      <!-- Idle / start -->
      <div class="panel" id="startPanel">
        <div class="big-emoji">🎧</div>
        <p class="panel-text">Hear the first few seconds of a song and guess its genre.</p>
        <button class="btn" id="startBtn">Start playing</button>
      </div>

      <!-- Loading a round -->
      <div class="panel" id="loadingPanel" hidden>
        <div class="spinner"></div>
        <p class="panel-text">Loading a track…</p>
      </div>

      <!-- Error -->
      <div class="panel" id="errorPanel" hidden>
        <div class="big-emoji">😕</div>
        <p class="panel-text" id="errorText">Couldn't load a track.</p>
        <button class="btn" id="retryBtn">Try again</button>
      </div>

      <!-- Active round -->
      <div class="panel round-panel" id="roundPanel" hidden>
        <div class="now-playing">
          <div class="eq" id="eq" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
          <span id="playState">Playing intro…</span>
        </div>

        <div class="reveal" id="reveal" hidden>
          <img class="art" id="art" alt="" />
          <div class="track-title" id="trackTitle"></div>
          <div class="track-artist" id="trackArtist"></div>
        </div>

        <div class="options" id="options"></div>

        <div class="round-actions">
          <button class="btn btn-ghost" id="replayBtn">Replay intro</button>
          <button class="btn" id="nextBtn" hidden>Next song</button>
        </div>
      </div>
    </div>

    <footer class="controls">
      <a class="link" href="index.html">← Perfect Circle</a>
      <div class="stats">
        <span class="stat">Best <span id="bestScore">—</span></span>
        <span class="stat-sep">·</span>
        <span class="stat">Streak <span id="footerStreak">0</span></span>
      </div>
    </footer>
  </div>

  <audio id="player" preload="auto" crossorigin="anonymous"></audio>
  <script src="genre.js?v=1"></script>
</body>
</html>
