<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#08080f" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>ROOTS — Guess the Sub-Genre</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="genre.css?v=13" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>ROOTS</h1>
    </header>

    <div class="stage" id="stage">
      <!-- Home / chapter select -->
      <section class="view view-home" id="vHome">
        <span class="kicker">Pick a chapter</span>
        <div class="chapter-list" id="chapterList"></div>
      </section>

      <!-- Chapter intro -->
      <section class="view" id="vChapter" hidden>
        <span class="kicker" id="chKicker"></span>
        <h2 class="chapter-title" id="chTitle"></h2>
        <span class="chapter-scene" id="chScene"></span>
        <p class="lead" id="chIntro"></p>
        <div class="row">
          <button class="btn btn-ghost" id="chBackBtn">Back</button>
          <button class="btn btn-big" id="chBeginBtn">Play</button>
        </div>
      </section>

      <!-- Loading -->
      <section class="view" id="vLoading" hidden>
        <div class="spinner"></div>
        <span class="lead">Cueing the clips…</span>
      </section>

      <!-- Error -->
      <section class="view" id="vError" hidden>
        <p class="lead" id="errorText">Couldn’t load this one.</p>
        <div class="row">
          <button class="btn btn-ghost" id="retryBtn">Try again</button>
          <button class="btn" id="skipBtn">Skip</button>
        </div>
      </section>

      <!-- Guessing -->
      <section class="view" id="vRound" hidden>
        <div class="playbar" id="playbar">
          <div class="pb-fill" id="pbFill"></div>
          <span class="pb-tick" style="left:33.33%"></span>
          <span class="pb-tick" style="left:66.66%"></span>
        </div>
        <div class="eq" id="eq" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
        <div class="options" id="options"></div>
      </section>

      <!-- Reveal -->
      <section class="view reveal" id="vReveal" hidden>
        <span class="verdict" id="verdict"></span>
        <span class="points-awarded" id="revPoints"></span>
        <h2 class="genre-name" id="revName"></h2>
        <span class="genre-meta" id="revMeta"></span>
        <p class="track-line" id="revTrack"></p>
        <p class="note" id="revNote"></p>
        <p class="lineage" id="lineage"></p>
        <button class="btn btn-big" id="nextBtn">Next</button>
      </section>

      <!-- Chapter complete -->
      <section class="view" id="vChapterEnd" hidden>
        <span class="kicker">Chapter complete</span>
        <h2 class="chapter-title" id="ceTitle"></h2>
        <p class="lead" id="ceOutro"></p>
        <span class="score-line" id="ceScore"></span>
        <button class="btn btn-big" id="ceBackBtn">Back to chapters</button>
      </section>
    </div>

    <footer class="controls">
      <span class="stat">Score <span id="scoreStat">0</span></span>
      <div class="stats">
        <span class="stat">Streak <span id="footerStreak">0</span></span>
        <span class="stat-sep">·</span>
        <span class="stat">Best <span id="bestScore">0</span></span>
      </div>
    </footer>
  </div>

  <audio id="player" preload="auto"></audio>
  <script src="genre.js?v=13"></script>
</body>
</html>
