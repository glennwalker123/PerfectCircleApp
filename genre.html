<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#08080f" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>ROOTS — Guess the Sub-Genre</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="genre.css?v=4" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>ROOTS</h1>
    </header>

    <div class="stage">
      <!-- Start -->
      <section class="view" id="vStart">
        <div class="big-emoji">🎚️</div>
        <p class="lead">A crate-digger’s ear test. Each chapter drops you into a scene — hear the cut, name the sub-genre, learn the story.</p>
        <button class="btn btn-big" id="startBtn">Start</button>
      </section>

      <!-- Chapter intro -->
      <section class="view" id="vChapter" hidden>
        <span class="kicker" id="chKicker">Chapter 1 / 8</span>
        <h2 class="chapter-title" id="chTitle"></h2>
        <span class="chapter-scene" id="chScene"></span>
        <p class="lead" id="chIntro"></p>
        <button class="btn btn-big" id="chBeginBtn">Begin chapter</button>
      </section>

      <!-- Loading -->
      <section class="view" id="vLoading" hidden>
        <div class="spinner"></div>
        <span class="lead">Cueing the track…</span>
      </section>

      <!-- Error -->
      <section class="view" id="vError" hidden>
        <p class="lead" id="errorText">Couldn’t load this track.</p>
        <div class="row">
          <button class="btn btn-ghost" id="retryBtn">Try again</button>
          <button class="btn" id="skipBtn">Skip</button>
        </div>
      </section>

      <!-- Guessing -->
      <section class="view" id="vRound" hidden>
        <div class="player">
          <div class="disc" id="disc">
            <div class="eq" id="eq" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
          </div>
          <div class="player-meta">
            <span class="round-tag" id="roundTag">Track 1 of 5</span>
            <span id="playState">Playing…</span>
          </div>
          <button class="icon-btn" id="replayBtn" title="Replay">↺</button>
        </div>
        <div class="options" id="options"></div>
        <button class="textlink" id="anotherBtn" hidden>Hear another track ↻</button>
      </section>

      <!-- Reveal -->
      <section class="view reveal" id="vReveal" hidden>
        <span class="verdict" id="verdict"></span>
        <h2 class="genre-name" id="revName"></h2>
        <span class="genre-meta" id="revMeta"></span>
        <p class="track-line" id="revTrack"></p>
        <p class="note" id="revNote"></p>
        <button class="btn btn-big" id="nextBtn">Next</button>
      </section>

      <!-- Chapter complete -->
      <section class="view" id="vChapterEnd" hidden>
        <span class="kicker">Chapter complete</span>
        <h2 class="chapter-title" id="ceTitle"></h2>
        <p class="lead" id="ceOutro"></p>
        <span class="score-line" id="ceScore"></span>
        <button class="btn btn-big" id="ceNextBtn">Next chapter</button>
      </section>

      <!-- All done -->
      <section class="view" id="vEnd" hidden>
        <div class="big-emoji">🏆</div>
        <p class="lead" id="endText"></p>
        <button class="btn btn-big" id="replayAllBtn">Play again</button>
      </section>
    </div>

    <footer class="controls">
      <span class="stat" id="chapterStat">Chapter —</span>
      <div class="stats">
        <span class="stat">Streak <span id="footerStreak">0</span></span>
        <span class="stat-sep">·</span>
        <span class="stat">Best <span id="bestScore">0</span></span>
      </div>
    </footer>
  </div>

  <audio id="player" preload="auto"></audio>
  <script src="genre.js?v=4"></script>
</body>
</html>
